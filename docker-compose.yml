version: '3.8'

services:
  web:
    image: quocnhannhan92/kidcoin-backend:latest
    container_name: kid_coin_web
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kidcoin_user:kidcoin_password@db:5432/kidcoin_db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:15-alpine
    container_name: kid_coin_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=kidcoin_user
      - POSTGRES_PASSWORD=kidcoin_password
      - POSTGRES_DB=kidcoin_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kidcoin_user -d kidcoin_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
