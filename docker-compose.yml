
services:
  web:
    build: .
    container_name: kid_coin_web
    volumes:
      - .:/app
    ports:
      - "80:8000"
    environment:
      - DATABASE_URL=postgresql://kidcoin_user:kidcoin_password@db:5432/kidcoin_db
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: kid_coin_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=kidcoin_user
      - POSTGRES_PASSWORD=kidcoin_password
      - POSTGRES_DB=kidcoin_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kidcoin_user -d kidcoin_db" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
