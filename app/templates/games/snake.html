<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Rắn Săn Mồi 🐍 — KidCoin Game Hub</title>
    <meta name="description"
        content="Chơi game Rắn Săn Mồi miễn phí! Giúp bé rèn luyện phản xạ và tư duy chiến thuật. Không cần cài đặt.">
    <meta property="og:title" content="Rắn Săn Mồi 🐍 — KidCoin Game Hub">
    <meta property="og:description" content="Game mini vui nhộn cho trẻ em. Thử thách kỷ lục của bạn ngay!">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #141428;
            --accent: #10b981;
            --text: #f1f0ff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            color: var(--accent);
        }

        .score-board {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 10px 0;
        }

        canvas {
            background: #000;
            border: 4px solid var(--surface);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            max-width: 95vw;
            max-height: 70vh;
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .btn:active {
            background: var(--accent);
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            z-index: 100;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        .avatar-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .avatar-btn:hover {
            background: var(--accent);
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>

<body>
    <a href="/game" class="back-link">← Quay lại</a>
    <button class="avatar-btn" onclick="document.getElementById('avatarInput').click()">
        📸 <span>Đổi Avatar</span>
    </button>
    <input type="file" id="avatarInput" hidden accept="image/*" capture="user" onchange="handleAvatar(this)">

    <div class="game-header">
        <h1>Bé Rắn Săn Mồi 🐍</h1>
        <div class="score-board">Điểm: <span id="score">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER!</h2>
        <p id="finalScoreText"></p>
        <button class="btn" onclick="resetGame()" style="background: var(--accent)">Chơi lại</button>
    </div>

    <!-- Mobile Controls -->
    <div class="controls">
        <div></div>
        <button class="btn" onclick="changeDir('up')">UP</button>
        <div></div>
        <button class="btn" onclick="changeDir('left')">LEFT</button>
        <button class="btn" onclick="changeDir('down')">DOWN</button>
        <button class="btn" onclick="changeDir('right')">RIGHT</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreText = document.getElementById('finalScoreText');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameSpeed = 150;
        let nextDx = 0;
        let nextDy = 0;
        let avatarImg = null;

        function handleAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = () => { avatarImg = img; };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function drawGame() {
            moveSnake();
            if (checkGameOver()) return;

            // Clear canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ef4444';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Draw snake
            ctx.shadowBlur = 0;
            snake.forEach((part, index) => {
                if (index === 0) {
                    if (avatarImg) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(part.x * gridSize + gridSize / 2, part.y * gridSize + gridSize / 2, gridSize / 2, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(avatarImg, part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                        ctx.restore();
                        // Border
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(part.x * gridSize + gridSize / 2, part.y * gridSize + gridSize / 2, gridSize / 2, 0, Math.PI * 2);
                        ctx.stroke();
                    } else {
                        ctx.font = `${gridSize}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('👶', part.x * gridSize + gridSize / 2, part.y * gridSize + gridSize / 2);
                    }
                } else {
                    ctx.fillStyle = '#059669';
                    ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                }
            });

            setTimeout(drawGame, gameSpeed);
        }

        function moveSnake() {
            dx = nextDx;
            dy = nextDy;
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
                gameSpeed = Math.max(80, 150 - Math.floor(score / 50) * 5);
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Don't spawn food on snake
            if (snake.some(p => p.x === food.x && p.y === food.y)) generateFood();
        }

        function checkGameOver() {
            if (dx === 0 && dy === 0) return false;
            const head = snake[0];

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
                snake.slice(1).some(p => p.x === head.x && p.y === head.y)) {
                gameOverEl.style.display = 'flex';
                finalScoreText.innerText = `Điểm của bạn: ${score}`;
                return true;
            }
            return false;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0; dy = 0; nextDx = 0; nextDy = 0;
            score = 0;
            gameSpeed = 150;
            scoreElement.innerText = score;
            gameOverEl.style.display = 'none';
            generateFood();
            drawGame();
        }

        function changeDir(dir) {
            if (dir === 'up' && dy === 0) { nextDx = 0; nextDy = -1; }
            if (dir === 'down' && dy === 0) { nextDx = 0; nextDy = 1; }
            if (dir === 'left' && dx === 0) { nextDx = -1; nextDy = 0; }
            if (dir === 'right' && dx === 0) { nextDx = 1; nextDy = 0; }
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDir('up');
            if (e.key === 'ArrowDown') changeDir('down');
            if (e.key === 'ArrowLeft') changeDir('left');
            if (e.key === 'ArrowRight') changeDir('right');
        });

        generateFood();
        drawGame();
    </script>
</body>

</html>
