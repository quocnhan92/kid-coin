<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidCoin Admin - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <a href="/admin" class="logo">KidCoin Admin</a>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="/admin" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                            <i class="fas fa-chart-pie"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/families" class="nav-link {% if active_page == 'families' %}active{% endif %}">
                            <i class="fas fa-users"></i> Families
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/master-data" class="nav-link {% if active_page == 'master_data' %}active{% endif %}">
                            <i class="fas fa-database"></i> Master Data
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/logs" class="nav-link {% if active_page == 'logs' %}active{% endif %}">
                            <i class="fas fa-terminal"></i> Error Logs
                        </a>
                    </li>
                    <li class="nav-item" style="margin-top: 2rem;">
                        <a href="/logout" class="nav-link">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="title-group">
                    <h1>{% block page_title %}{% endblock %}</h1>
                    <p>{% block page_subtitle %}{% endblock %}</p>
                </div>
                <div class="user-info">
                    <span id="admin-name">System Admin</span>
                </div>
            </header>

            <div class="content-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
