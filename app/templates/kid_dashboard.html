<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidCoin - Bé Làm Việc Tốt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; animation: fadeIn 0.2s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .coin-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="bg-yellow-100 flex justify-center items-center min-h-screen font-sans">

    <div class="bg-white w-full max-w-md h-[800px] rounded-3xl shadow-2xl overflow-hidden flex flex-col relative border-4 border-yellow-400">

        <!-- Header -->
        <div class="bg-yellow-300 px-6 py-6 border-b-4 border-yellow-400 shadow-sm flex justify-between items-center z-10 rounded-b-3xl">
            <div>
                <h1 class="text-2xl font-extrabold text-yellow-900 drop-shadow-sm flex items-center gap-2">
                    Chào Bé <span id="kid-name-header">...</span>! 
                    <button onclick="showProfileModal()" class="text-sm bg-yellow-400 hover:bg-yellow-50 rounded-full px-2 py-1 shadow-sm transition-colors">✏️</button>
                </h1>
                <div class="flex items-center gap-2 mt-2 bg-white/50 px-3 py-1 rounded-full w-fit">
                    <span class="text-2xl">💰</span>
                    <span id="coin-balance" class="text-xl font-black text-yellow-800">0</span>
                    <span class="text-xs font-bold text-yellow-800">Xu</span>
                </div>
            </div>
            <div class="relative cursor-pointer" onclick="showProfileModal()">
                <img id="kid-avatar-header" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bin" class="w-16 h-16 rounded-full border-4 border-white bg-yellow-100 shadow-md">
                <div class="absolute bottom-0 right-0 bg-white rounded-full p-1 shadow">✏️</div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-4 pb-24 bg-yellow-50">

            <!-- Tab: Quests (Nhiệm vụ) -->
            <div id="tab-quests" class="tab-content active space-y-4">
                <h2 class="text-lg font-black text-yellow-800 mb-2 uppercase tracking-wide">Việc hôm nay 📅</h2>
                <div id="quest-list" class="space-y-3">
                    <!-- Dynamic Quests Here -->
                    <div class="text-center text-gray-400 py-10">Đang tải nhiệm vụ...</div>
                </div>
            </div>

            <!-- Tab: Shop (Cửa hàng) -->
            <div id="tab-shop" class="tab-content space-y-4">
                <h2 class="text-lg font-black text-purple-800 mb-2 uppercase tracking-wide">Đổi Quà 🎁</h2>
                <div id="shop-list" class="grid grid-cols-2 gap-3">
                    <!-- Dynamic Rewards Here -->
                </div>
            </div>

        </div>

        <!-- Bottom Navigation -->
        <div class="absolute bottom-0 w-full bg-white border-t-4 border-yellow-200 flex justify-around p-3 pb-6 rounded-t-3xl z-20 shadow-[0_-5px_20px_rgba(0,0,0,0.1)]">
            <button onclick="switchTab('quests')" id="btn-quests" class="nav-btn text-yellow-600 flex flex-col items-center w-1/2 transform transition hover:scale-105">
                <span class="text-4xl mb-1 filter drop-shadow-md">📝</span>
                <span class="text-sm font-black">Nhiệm Vụ</span>
            </button>
            <button onclick="switchTab('shop')" id="btn-shop" class="nav-btn text-gray-400 flex flex-col items-center w-1/2 transform transition hover:scale-105">
                <span class="text-4xl mb-1 filter drop-shadow-md grayscale opacity-50">🛒</span>
                <span class="text-sm font-black">Cửa Hàng</span>
            </button>
        </div>

    </div>

    <!-- Hidden input to force camera mode, ignoring gallery -->
    <input id="proof-image-input" type="file" accept="image/*" capture="environment" class="hidden">

    <!-- Modal: Sửa Profile -->
    <div id="profile-modal" class="hidden-section fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-sm border-4 border-yellow-400 relative">
            <h2 class="text-xl font-black text-yellow-800 mb-4 text-center">Trang trí thẻ của bé ✨</h2>
            
            <form id="profile-form" onsubmit="updateProfile(event)" class="space-y-4">
                <div>
                    <!-- Hiding Name Edit for Kids as requested, just showing it -->
                    <label class="block text-sm font-bold text-gray-700 mb-1">Tên gọi ở nhà</label>
                    <input type="text" id="edit-name" disabled class="w-full px-4 py-3 bg-gray-100 border-2 border-yellow-200 rounded-xl font-bold text-gray-500 text-center text-lg cursor-not-allowed" title="Nhờ bố mẹ đổi tên giúp nhé!">
                    <p class="text-xs text-gray-400 text-center mt-1">Nhờ bố mẹ đổi tên giúp nhé!</p>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 text-center">Chọn ảnh đại diện mới</label>
                    <div class="grid grid-cols-4 gap-3" id="avatar-grid">
                        <!-- Filled by JS -->
                    </div>
                    <input type="hidden" id="selected-avatar">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal('profile-modal')" class="flex-1 py-3 bg-gray-200 text-gray-800 font-bold rounded-xl hover:bg-gray-300">Hủy</button>
                    <button type="submit" class="flex-1 py-3 bg-yellow-400 text-yellow-900 font-black rounded-xl hover:bg-yellow-500 shadow-md transform active:scale-95">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Overlay Loading -->
    <div id="loading-overlay" class="hidden-section fixed inset-0 bg-black/60 flex flex-col justify-center items-center z-[60]">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-yellow-400 mb-4"></div>
        <p class="text-white font-bold text-lg drop-shadow-md">Đang xử lý ảnh...</p>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let pendingTaskUpload = null;
        let parentCommentsMap = {}; // To store comments if needed later

        // --- Logic ---

        async function fetchQuests() {
            try {
                const response = await fetch(`${API_BASE}/quests/daily`);
                if (!response.ok) throw new Error('Failed to fetch quests');
                const quests = await response.json();
                renderQuests(quests);
            } catch (error) {
                console.error(error);
                document.getElementById('quest-list').innerHTML = '<div class="text-center text-red-500 font-bold">Lỗi tải dữ liệu!</div>';
            }
        }

        async function fetchMe() {
            try {
                const response = await fetch(`${API_BASE}/users/me`);
                if (!response.ok) throw new Error('Failed to fetch user info');
                const me = await response.json();
                
                document.getElementById('coin-balance').innerText = me.current_coin;
                
                // Update kid name/avatar
                const nameHeader = document.getElementById('kid-name-header');
                const avatarHeader = document.getElementById('kid-avatar-header');
                if (me.display_name) {
                    nameHeader.innerText = me.display_name.split(' ').pop(); 
                    document.getElementById('edit-name').value = me.display_name;
                }
                if (me.avatar_url) {
                    avatarHeader.src = me.avatar_url;
                    document.getElementById('selected-avatar').value = me.avatar_url;
                }
            } catch (error) {
                console.error(error);
            }
        }

        function renderQuests(quests) {
            const container = document.getElementById('quest-list');
            container.innerHTML = '';

            if (quests.length === 0) {
                 container.innerHTML = '<div class="text-center text-gray-500 mt-10"><span class="text-5xl block mb-4">🎈</span>Hôm nay không có việc gì!<br>Đi chơi thôi!</div>';
                 return;
            }

            quests.forEach(quest => {
                const isPending = quest.status === 'PENDING_APPROVAL';
                const isDone = quest.status === 'APPROVED';
                const isRejected = quest.status === 'REJECTED';
                
                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-2xl shadow-md border-b-4 ${isDone ? 'border-green-400 opacity-70' : isPending ? 'border-blue-400' : isRejected ? 'border-red-400' : 'border-gray-200'} flex flex-col gap-3 transform transition hover:scale-[1.02]`;
                
                let actionArea = '';
                
                // Trạng thái: Chưa làm hoặc Bị từ chối
                if (!quest.status || isRejected) {
                    let reqText = quest.verification_type === 'Tự động duyệt' ? '⚡ Bấm là có điểm' : 
                                  quest.verification_type === 'Bố mẹ kiểm tra trực tiếp' ? '👀 Cần bố mẹ ktra' : '📸 Cần chụp ảnh';
                    
                    actionArea = `
                        <div class="flex justify-between items-center w-full">
                            <span class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded">${reqText}</span>
                            <button onclick="prepareTaskSubmit('${quest.task_id}', '${quest.name.replace(/'/g, "\\'")}', '${quest.verification_type}')" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-2 px-6 rounded-xl shadow-md active:translate-y-1 transition-all">
                                ${isRejected ? 'Làm lại!' : 'Làm xong!'}
                            </button>
                        </div>
                    `;
                } else if (isPending) {
                    actionArea = `<div class="w-full text-right"><span class="text-blue-500 font-bold text-sm bg-blue-50 px-3 py-1 rounded-full border border-blue-200">⏳ Đang chờ bố mẹ duyệt</span></div>`;
                } else if (isDone) {
                    actionArea = `<div class="w-full text-right"><span class="text-green-500 font-bold text-sm bg-green-50 px-3 py-1 rounded-full border border-green-200">✅ Hoàn thành xuất sắc</span></div>`;
                }

                // Add comment section if exists
                let commentHtml = '';
                if (quest.parent_comment) {
                    if (isRejected) {
                        commentHtml = `<div class="bg-red-50 p-3 rounded-xl text-sm text-red-700 font-medium flex gap-2 items-start border border-red-100"><span class="text-lg">👩‍🏫</span> <span>Bố mẹ nhắn: <em>"${quest.parent_comment}"</em></span></div>`;
                    } else if (isDone) {
                        commentHtml = `<div class="bg-green-50 p-3 rounded-xl text-sm text-green-700 font-medium flex gap-2 items-start border border-green-100"><span class="text-lg">🌟</span> <span>Bố mẹ khen: <em>"${quest.parent_comment}"</em></span></div>`;
                    }
                }

                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-4xl bg-gray-50 p-2 rounded-xl border border-gray-100">
                             ${getIcon(quest.name)}
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800 text-lg leading-tight">${quest.name}</h3>
                            <span class="text-yellow-600 font-black text-sm">+${quest.points_reward} Xu</span>
                        </div>
                    </div>
                    ${commentHtml}
                    ${actionArea}
                `;
                container.appendChild(card);
            });
        }

        function prepareTaskSubmit(taskId, taskName, verificationType) {
            if (!confirm(`Bé đã làm xong việc "${taskName}" chưa?`)) return;
            
            if (verificationType === 'Cần chụp ảnh') {
                pendingTaskUpload = { taskId, taskName };
                const input = document.getElementById('proof-image-input');
                input.value = ''; // clear old
                input.click(); // Mở camera
            } else {
                // Tự động duyệt hoặc Bố mẹ ktra trực tiếp -> Không cần ảnh
                submitTask(taskId, taskName, null, verificationType);
            }
        }

        function compressImageFile(file, maxWidth = 800, maxHeight = 800, initialQuality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        let quality = initialQuality;
                        const targetSize = 900 * 1024; // ~0.9MB (Dưới 1MB)
                        
                        const attemptCompress = () => {
                            canvas.toBlob((blob) => {
                                // Nếu ảnh vẫn to hơn 1MB và chất lượng chưa quá thấp, tiếp tục giảm
                                if (blob.size > targetSize && quality > 0.2) {
                                    quality -= 0.15;
                                    attemptCompress();
                                } else {
                                    const compressedFile = new File([blob], file.name, {
                                        type: 'image/jpeg',
                                        lastModified: Date.now()
                                    });
                                    resolve(compressedFile);
                                }
                            }, 'image/jpeg', quality);
                        };
                        
                        attemptCompress(); // Bắt đầu đệ quy nén
                    };
                    img.onerror = (error) => reject(error);
                };
                reader.onerror = (error) => reject(error);
            });
        }

        async function submitTask(taskId, taskName, proofImageUrl, verificationType) {
            try {
                // If it's a photo task and we have a local file, we need to upload it first
                let finalUrl = proofImageUrl;
                if (proofImageUrl && proofImageUrl instanceof File) {
                     document.getElementById('loading-overlay').classList.remove('hidden-section');
                     // Nén ảnh: Giới hạn 800x800, tự động giảm quality đến khi < 1MB
                     const compressedFile = await compressImageFile(proofImageUrl);

                     const formData = new FormData();
                     formData.append("file", compressedFile);
                     
                     const uploadRes = await fetch(`${API_BASE}/upload`, {
                         method: 'POST',
                         body: formData
                     });
                     
                     if (!uploadRes.ok) throw new Error("Lỗi tải ảnh lên. Vui lòng thử lại.");
                     const uploadData = await uploadRes.json();
                     finalUrl = uploadData.url;
                } else if (verificationType === 'Cần chụp ảnh' && !finalUrl) {
                     throw new Error("Không tìm thấy ảnh minh chứng.");
                }

                const body = { proof_image_url: finalUrl };
                
                const response = await fetch(`${API_BASE}/quests/${taskId}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Submit failed');
                }
                
                if (verificationType === 'Tự động duyệt') {
                    alert("Tuyệt vời! Bé đã được cộng điểm ngay lập tức! 🎉");
                    fetchMe(); // Update balance
                } else {
                    alert("Đã gửi báo cáo! Chờ bố mẹ duyệt nhé. 👍");
                }
                
                fetchQuests(); // Reload list

            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra: " + error.message);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden-section');
            }
        }

        async function fetchRewards() {
            try {
                const response = await fetch(`${API_BASE}/rewards/`);
                if (!response.ok) throw new Error('Failed to fetch rewards');
                const rewards = await response.json();
                renderRewards(rewards);
            } catch (error) {
                console.error(error);
            }
        }

        function renderRewards(rewards) {
             const container = document.getElementById('shop-list');
             container.innerHTML = '';
             
             if (rewards.length === 0) {
                 container.innerHTML = '<div class="text-center text-gray-500 col-span-2 mt-10">Cửa hàng đang đóng cửa 😢</div>';
                 return;
             }

             rewards.forEach(reward => {
                 const card = document.createElement('div');
                 card.className = "bg-white p-3 rounded-2xl shadow-md border-b-4 border-purple-200 flex flex-col items-center text-center justify-between h-full";
                 card.innerHTML = `
                    <div class="w-full flex flex-col items-center">
                        <div class="text-5xl mb-2">${getIcon(reward.name)}</div>
                        <h3 class="font-bold text-gray-800 text-sm leading-tight mb-1 h-10 flex items-center justify-center">${reward.name}</h3>
                        <div class="text-purple-600 font-black text-lg mb-3 bg-purple-50 px-3 rounded-full">${reward.points_cost} Xu</div>
                    </div>
                    <button onclick="redeemReward('${reward.id}', ${reward.points_cost})" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 rounded-xl text-sm shadow-sm active:scale-95 transition-all">Đổi Ngay</button>
                 `;
                 container.appendChild(card);
             });
        }

        async function redeemReward(rewardId, cost) {
            const currentBalance = parseInt(document.getElementById('coin-balance').innerText);
            if (currentBalance < cost) {
                alert("Bé chưa đủ xu để đổi món này! Hãy làm thêm việc nhé. 💪");
                return;
            }

            // Gọi bố mẹ ra nhập PIN - Để prototype nhanh, ta cứ confirm thường. Ở hệ thống thật sẽ gọi API login check PIN
            if(!confirm("Bé có chắc muốn đổi món quà này không?")) return;

            try {
                const response = await fetch(`${API_BASE}/rewards/${rewardId}/redeem`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Đổi quà thất bại');
                }
                
                const result = await response.json();
                alert(`Đổi thành công! Nhớ nhắc bố mẹ đưa quà nhé! 🎁\nSố dư mới: ${result.new_balance} Xu`);
                
                // Update Balance UI
                document.getElementById('coin-balance').innerText = result.new_balance;
                document.getElementById('coin-balance').parentElement.classList.add('coin-pop');
                setTimeout(() => document.getElementById('coin-balance').parentElement.classList.remove('coin-pop'), 300);

            } catch (error) {
                alert(error.message);
            }
        }

        // --- Profile Update ---
        function showProfileModal() {
            document.getElementById('profile-modal').classList.remove('hidden-section');
            renderAvatarGrid();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden-section');
        }

        function renderAvatarGrid() {
            const seeds = ['Bin', 'Na', 'Felix', 'Bella', 'Charlie', 'Molly', 'Coco', 'Buster', 'Max', 'Luna', 'Daisy', 'Rocky'];
            const grid = document.getElementById('avatar-grid');
            grid.innerHTML = '';
            
            const currentAvatar = document.getElementById('selected-avatar').value;

            seeds.forEach(seed => {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
                const isSelected = url === currentAvatar;
                
                const img = document.createElement('img');
                img.src = url;
                img.className = `w-14 h-14 rounded-full cursor-pointer border-4 transition-all ${isSelected ? 'border-yellow-500 scale-110 shadow-md' : 'border-transparent hover:border-yellow-200'}`;
                img.onclick = () => {
                    document.getElementById('selected-avatar').value = url;
                    renderAvatarGrid(); // re-render to update borders
                };
                grid.appendChild(img);
            });
        }

        async function updateProfile(event) {
            event.preventDefault();
            // Name is disabled for kids, so we only update avatar
            // const name = document.getElementById('edit-name').value;
            const avatarUrl = document.getElementById('selected-avatar').value;

            try {
                const res = await fetch(`${API_BASE}/users/me`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ avatar_url: avatarUrl })
                });

                if(!res.ok) throw new Error("Cập nhật thất bại");
                
                alert("Đổi ảnh thành công! ✨");
                closeModal('profile-modal');
                fetchMe(); // Refresh data

            } catch(e) {
                alert(e.message);
            }
        }


        function getIcon(name) {
            const map = {
                'Đánh răng': '🪥',
                'Gấp chăn': '🛏️',
                'Học bài': '📚',
                'Toán': '📐',
                'Rửa bát': '🍽️',
                'Quét': '🧹',
                'Chơi': '🎮',
                'Kẹo': '🍬',
                'TV': '📺',
                'Kem': '🍦',
                'Đi': '🚶',
                'Ngủ': '😴',
                'Sách': '📖'
            };
            for (const key in map) {
                if (name.includes(key)) return map[key];
            }
            return '✨';
        }

        // --- Tabs ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-yellow-600');
                el.querySelector('span:first-child').classList.add('grayscale', 'opacity-50');
            });

            document.getElementById('tab-' + tabId).classList.add('active');
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.add('text-yellow-600');
            activeBtn.classList.remove('text-gray-400');
            activeBtn.querySelector('span:first-child').classList.remove('grayscale', 'opacity-50');
            
            if (tabId === 'shop') fetchRewards();
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchQuests();
            fetchMe();

            const proofInput = document.getElementById('proof-image-input');
            proofInput.addEventListener('change', async (event) => {
                const file = event.target.files?.[0];
                if (!file || !pendingTaskUpload) return;

                try {
                    // Truyền File object vào submitTask, hàm submitTask sẽ tự động gọi nén và upload API
                    await submitTask(pendingTaskUpload.taskId, pendingTaskUpload.taskName, file, 'Cần chụp ảnh');
                } catch (error) {
                    console.error(error);
                    alert(error.message || "Không thể xử lý ảnh.");
                } finally {
                    event.target.value = ''; // Reset input
                    pendingTaskUpload = null;
                }
            });
        });
    </script>
</body>
</html>
