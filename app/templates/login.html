<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidCoin - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view { display: none; }
        .pin-dot { width: 1rem; height: 1rem; border: 2px solid #9ca3af; border-radius: 50%; }
        .pin-dot.filled { background-color: #3b82f6; border-color: #3b82f6; }
        /* Animation */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">

    <div class="bg-white w-full max-w-md h-[800px] rounded-3xl shadow-2xl overflow-hidden flex flex-col relative border-4 border-gray-800 p-8 text-center fade-in">

        <!-- Loading View -->
        <div id="loading-view" class="flex flex-col justify-center items-center h-full">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-gray-500 font-medium">Đang kết nối đến Nhà Cà Rốt...</p>
        </div>

        <!-- View 1: Chọn thành viên (Device đã đăng ký) -->
        <div id="view-select-user" class="hidden-view h-full flex flex-col">
            <h1 class="text-xl font-bold text-gray-600 mb-1">Chào mừng về nhà</h1>
            <h2 id="family-name" class="text-3xl font-extrabold text-blue-600 mb-10">...</h2>
            
            <div id="user-grid" class="grid grid-cols-2 gap-x-6 gap-y-10 flex-1 content-start">
                <!-- Dynamic User Avatars Here -->
            </div>
            
            <div class="mt-auto pt-6 border-t border-gray-100">
                <button onclick="logoutDevice()" class="text-gray-400 text-sm hover:text-red-500 transition-colors">Đăng xuất thiết bị này</button>
            </div>
        </div>

        <!-- View 2: Đăng nhập lần đầu (Device chưa đăng ký) -->
        <div id="view-register-device" class="hidden-view h-full flex flex-col justify-center">
            <div class="mb-8">
                <span class="text-6xl">🏠</span>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800 mb-2">Thiết bị mới?</h1>
            <p class="text-gray-500 mb-8 text-sm px-4">Bố mẹ hãy đăng nhập để cấp quyền truy cập cho thiết bị này nhé.</p>
            
            <form id="register-form" class="space-y-4 text-left w-full">
                <div>
                    <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tài khoản</label>
                    <input type="text" id="username" value="botuan" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="Nhập tên đăng nhập">
                </div>
                <div>
                    <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Mật khẩu</label>
                    <input type="password" id="password" value="1234" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="••••">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all mt-4">
                    Kết nối ngay
                </button>
            </form>
        </div>

        <!-- View 3: Nhập PIN cho Bố Mẹ -->
        <div id="view-enter-pin" class="hidden-view h-full flex flex-col pt-10">
            <div class="mb-6">
                <img id="pin-avatar" src="" class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-blue-100">
                <h1 class="text-xl font-bold text-gray-800">Nhập mã PIN</h1>
                <p class="text-sm text-gray-500">Để truy cập quyền quản trị</p>
            </div>
            
            <div id="pin-dots" class="flex justify-center gap-6 mb-10">
                <div class="pin-dot transition-all duration-200"></div>
                <div class="pin-dot transition-all duration-200"></div>
                <div class="pin-dot transition-all duration-200"></div>
                <div class="pin-dot transition-all duration-200"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 px-4 mt-auto pb-8">
                <button onclick="enterPin('1')" class="pin-btn">1</button> <button onclick="enterPin('2')" class="pin-btn">2</button> <button onclick="enterPin('3')" class="pin-btn">3</button>
                <button onclick="enterPin('4')" class="pin-btn">4</button> <button onclick="enterPin('5')" class="pin-btn">5</button> <button onclick="enterPin('6')" class="pin-btn">6</button>
                <button onclick="enterPin('7')" class="pin-btn">7</button> <button onclick="enterPin('8')" class="pin-btn">8</button> <button onclick="enterPin('9')" class="pin-btn">9</button>
                <button onclick="clearPin()" class="pin-btn text-sm font-medium text-red-500">Xóa</button> 
                <button onclick="enterPin('0')" class="pin-btn">0</button> 
                <button onclick="showView('view-select-user')" class="pin-btn text-sm font-medium text-gray-500">Quay lại</button>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '/api/v1/auth';
        let deviceId = '';
        let pinInput = '';
        let selectedUserForPin = null;

        // --- Device ID Management ---
        function getOrSetDeviceId() {
            let id = localStorage.getItem('kidcoin_device_id');
            if (!id) {
                id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
                localStorage.setItem('kidcoin_device_id', id);
            }
            return id;
        }

        // --- View Switching ---
        function showView(viewId) {
            ['view-select-user', 'view-register-device', 'view-enter-pin', 'loading-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden-view');
            });
            document.getElementById(viewId).classList.remove('hidden-view');
            
            // Auto focus for register view
            if(viewId === 'view-register-device') {
                setTimeout(() => document.getElementById('username').focus(), 100);
            }
        }

        // --- API Calls ---
        async function checkDevice() {
            showView('loading-view');
            try {
                // Simulate network delay for better UX feel
                await new Promise(r => setTimeout(r, 500)); 
                
                const response = await fetch(`${API_BASE}/device-status`, {
                    headers: { 'X-Device-ID': deviceId }
                });
                const data = await response.json();

                if (data.is_registered) {
                    renderUserSelection(data.family_name, data.members);
                    showView('view-select-user');
                } else {
                    showView('view-register-device');
                }
            } catch (error) {
                console.error(error);
                // Fallback for demo if API fails (e.g., server not running yet)
                showView('view-register-device');
            }
        }

        async function registerDevice(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = event.target.querySelector('button');
            
            // Loading state
            const originalText = btn.innerText;
            btn.innerText = "Đang xử lý...";
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/register-device`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        device_id: deviceId,
                        device_name: navigator.platform + " Browser" 
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Đăng ký thất bại');

                renderUserSelection(data.family_name, data.members);
                showView('view-select-user');

            } catch (error) {
                alert(error.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function quickLogin(user) {
            if (user.role === 'PARENT') {
                selectedUserForPin = user;
                // Pre-fill avatar
                document.getElementById('pin-avatar').src = user.avatar_url;
                clearPin();
                showView('view-enter-pin');
                return;
            }
            // Kid login
            await performQuickLogin(user.id);
        }

        async function performQuickLogin(userId, pin = null) {
            try {
                const response = await fetch(`${API_BASE}/quick-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        device_id: deviceId,
                        pin: pin
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Đăng nhập thất bại');

                window.location.href = data.redirect_url;

            } catch (error) {
                alert(error.message);
                if (pin) clearPin();
            }
        }
        
        function logoutDevice() {
            if(confirm("Bạn có chắc muốn quên thiết bị này không? Lần sau sẽ phải đăng nhập lại từ đầu.")) {
                localStorage.removeItem('kidcoin_device_id');
                window.location.reload();
            }
        }

        // --- UI Rendering ---
        function renderUserSelection(familyName, members) {
            document.getElementById('family-name').innerText = familyName;
            const grid = document.getElementById('user-grid');
            grid.innerHTML = '';
            
            // Sort: Parents first
            members.sort((a, b) => (a.role === 'PARENT' ? -1 : 1));

            members.forEach(user => {
                const userCard = document.createElement('div');
                userCard.className = 'flex flex-col items-center cursor-pointer group';
                userCard.onclick = () => quickLogin(user);
                
                const borderColor = user.role === 'PARENT' ? 'border-blue-200' : 'border-yellow-200';
                const ringColor = user.role === 'PARENT' ? 'group-hover:ring-blue-400' : 'group-hover:ring-yellow-400';

                userCard.innerHTML = `
                    <div class="relative mb-3 transition-transform duration-200 group-hover:scale-110">
                        <img src="${user.avatar_url || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.display_name}" class="w-28 h-28 rounded-full border-4 ${borderColor} shadow-lg bg-white object-cover ring-2 ring-transparent ${ringColor} transition-all">
                        ${user.role === 'PARENT' ? 
                        '<span class="absolute bottom-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-white shadow-sm">ADMIN</span>' : ''}
                    </div>
                    <span class="font-bold text-lg text-gray-700 group-hover:text-gray-900">${user.display_name}</span>
                `;
                grid.appendChild(userCard);
            });
        }

        // --- PIN Logic ---
        function enterPin(num) {
            if (pinInput.length < 4) {
                pinInput += num;
                updatePinDots();
                if (pinInput.length === 4) {
                    // Slight delay for UX
                    setTimeout(() => performQuickLogin(selectedUserForPin.id, pinInput), 100);
                }
            }
        }
        function clearPin() {
            pinInput = '';
            updatePinDots();
        }
        function updatePinDots() {
            const dots = document.querySelectorAll('#pin-dots .pin-dot');
            dots.forEach((dot, index) => {
                if (index < pinInput.length) {
                    dot.classList.add('filled', 'bg-blue-500', 'border-blue-500');
                } else {
                    dot.classList.remove('filled', 'bg-blue-500', 'border-blue-500');
                }
            });
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            deviceId = getOrSetDeviceId();
            document.getElementById('register-form').addEventListener('submit', registerDevice);
            
            // Style PIN buttons
            document.querySelectorAll('.pin-btn').forEach(btn => {
                if(!btn.className.includes('text-sm')) {
                    btn.className = 'pin-btn text-2xl font-bold text-gray-700 bg-gray-100 rounded-full w-16 h-16 flex items-center justify-center shadow-sm hover:bg-gray-200 active:bg-blue-100 transition-colors mx-auto';
                }
            });
            
            checkDevice();
        });
    </script>
</body>
</html>
