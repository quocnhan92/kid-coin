<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidCoin - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view { display: none; }
        .pin-dot { width: 1rem; height: 1rem; border: 2px solid #9ca3af; border-radius: 50%; }
        .pin-dot.filled { background-color: #3b82f6; border-color: #3b82f6; }
        /* Animation */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">

    <div class="bg-white w-full max-w-md h-[800px] rounded-3xl shadow-2xl overflow-hidden flex flex-col relative border-4 border-gray-800 p-8 text-center fade-in">

        <!-- Loading View -->
        <div id="loading-view" class="flex flex-col justify-center items-center h-full">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-gray-500 font-medium">Đang kết nối đến Nhà Cà Rốt...</p>
        </div>

        <!-- View 1: Chọn thành viên (Device đã đăng ký) -->
        <div id="view-select-user" class="hidden-view h-full flex flex-col">
            <h1 class="text-xl font-bold text-gray-600 mb-1">Chào mừng về nhà</h1>
            <h2 id="family-name" class="text-3xl font-extrabold text-blue-600 mb-10">...</h2>
            
            <div id="user-grid" class="grid grid-cols-2 gap-x-6 gap-y-10 flex-1 content-start">
                <!-- Dynamic User Avatars Here -->
            </div>
            
            <div class="mt-auto pt-6 border-t border-gray-100">
                <button onclick="logoutDevice()" class="text-gray-400 text-sm hover:text-red-500 transition-colors">Đăng xuất thiết bị này</button>
            </div>
        </div>

        <!-- View 2: Đăng nhập lần đầu (Device chưa đăng ký) -->
        <!-- View 2: Đăng nhập lần đầu (Device chưa đăng ký) -->
        <div id="view-register-device" class="hidden-view h-full flex flex-col justify-center pb-8">
            <div class="mb-4">
                <span class="text-5xl">🏠</span>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800 mb-2">Thiết bị mới?</h1>
            <p class="text-gray-500 mb-4 text-sm px-4">Bố mẹ hãy thiết lập để thiết bị này có thể truy cập.</p>

            <!-- Tabs -->
            <div class="flex gap-2 mb-4 bg-gray-100 p-1 rounded-xl">
                <button onclick="toggleAuthMode('login')" id="tab-login" class="flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600 transition-all">🏠 Đã có Nhà</button>
                <button onclick="toggleAuthMode('register')" id="tab-register" class="flex-1 py-3 rounded-lg font-bold text-sm text-gray-500 hover:text-gray-700 transition-all">✨ Tạo Nhà Mới</button>
            </div>
            
            <div class="flex-1 overflow-y-auto w-full px-1" style="-webkit-overflow-scrolling: touch;">
                <!-- Form: Login to Existing Family -->
                <form id="login-form" onsubmit="loginDevice(event)" class="space-y-4 text-left w-full h-full pb-4 px-2">
                    <div>
                        <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tài khoản Quản trị</label>
                        <input type="text" id="username" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="VD: botuan">
                    </div>
                    <div>
                        <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Mật khẩu PIN</label>
                        <input type="password" id="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="Mã PIN 4 số">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all mt-4">
                        Kết nối vào Nhà
                    </button>
                </form>

                <!-- Form: Create New Family -->
                <form id="register-form" onsubmit="registerFamily(event)" class="space-y-4 text-left w-full hidden-view pb-4 px-2">
                    <div>
                        <label for="reg-family-name" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tên Nhà / Gia đình</label>
                        <input type="text" id="reg-family-name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="VD: Gia đình Gấu Bự">
                    </div>
                    <div>
                        <label for="reg-display-name" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tên Bố/Mẹ</label>
                        <input type="text" id="reg-display-name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="VD: Bố Tuấn">
                    </div>
                    <div>
                        <label for="reg-username" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tài khoản Đăng nhập</label>
                        <input type="text" id="reg-username" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="Viết liền không dấu, VD: botuan">
                    </div>
                    <div>
                        <label for="reg-password" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Mật khẩu PIN (4 số)</label>
                        <input type="password" id="reg-password" required maxlength="4" pattern="\d{4}" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-medium text-gray-800 placeholder-gray-400" placeholder="Mã PIN 4 số">
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-200 hover:bg-green-700 active:scale-95 transition-all mt-4">
                        Tạo Nhà ngay
                    </button>
                </form>
            </div>
        </div>
        <!-- View 3: Nhập PIN cho Bố Mẹ -->
        <div id="view-enter-pin" class="hidden-view h-full flex flex-col pt-10">
            <div class="mb-6">
                <img id="pin-avatar" src="" class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-blue-100">
                <h1 class="text-xl font-bold text-gray-800">Nhập mã PIN</h1>
                <p class="text-sm text-gray-500">Để truy cập quyền quản trị</p>
            </div>
            
            <div id="pin-dots" class="flex justify-center gap-6 mb-10">
                <div class="pin-dot transition-all duration-200"></div>
                <div class="pin-dot transition-all duration-200"></div>
                <div class="pin-dot transition-all duration-200"></div>
                <div class="pin-dot transition-all duration-200"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 px-4 mt-auto pb-8">
                <button onclick="enterPin('1')" class="pin-btn">1</button> <button onclick="enterPin('2')" class="pin-btn">2</button> <button onclick="enterPin('3')" class="pin-btn">3</button>
                <button onclick="enterPin('4')" class="pin-btn">4</button> <button onclick="enterPin('5')" class="pin-btn">5</button> <button onclick="enterPin('6')" class="pin-btn">6</button>
                <button onclick="enterPin('7')" class="pin-btn">7</button> <button onclick="enterPin('8')" class="pin-btn">8</button> <button onclick="enterPin('9')" class="pin-btn">9</button>
                <button onclick="clearPin()" class="pin-btn text-sm font-medium text-red-500">Xóa</button> 
                <button onclick="enterPin('0')" class="pin-btn">0</button> 
                <button onclick="showView('view-select-user')" class="pin-btn text-sm font-medium text-gray-500">Quay lại</button>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '/api/v1/auth';
        let deviceId = '';
        let pinInput = '';
        let selectedUserForPin = null;

        // --- Device ID Management ---
        function getOrSetDeviceId() {
            let id = localStorage.getItem('kidcoin_device_id');
            if (!id) {
                id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
                localStorage.setItem('kidcoin_device_id', id);
            }
            return id;
        }

        // --- View Switching ---
        function toggleAuthMode(mode) {
            const btnLogin = document.getElementById('tab-login');
            const btnRegister = document.getElementById('tab-register');
            const formLogin = document.getElementById('login-form');
            const formRegister = document.getElementById('register-form');

            if (mode === 'login') {
                btnLogin.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600 transition-all";
                btnRegister.className = "flex-1 py-2 rounded-lg font-bold text-sm text-gray-500 hover:text-gray-700 transition-all";
                formLogin.style.display = 'block';
                formRegister.style.display = 'none';
            } else {
                btnRegister.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600 transition-all";
                btnLogin.className = "flex-1 py-2 rounded-lg font-bold text-sm text-gray-500 hover:text-gray-700 transition-all";
                formLogin.style.display = 'none';
                formRegister.style.display = 'block';
            }
        }

        function showView(viewId) {
            console.log('🔄 showView called with:', viewId);

            // Hide all views
            const allViews = ['view-select-user', 'view-register-device', 'view-enter-pin', 'loading-view'];
            allViews.forEach(id => {
                const view = document.getElementById(id);
                if (view) {
                    view.style.display = 'none';
                    console.log(`  ✓ Hid ${id}`);
                }
            });

            // Show target view
            const targetView = document.getElementById(viewId);
            if (targetView) {
                targetView.style.display = 'flex';
                console.log(`  ✓ Showed ${viewId}`);
            } else {
                console.error(`  ❌ View ${viewId} not found!`);
            }

            // Auto focus for register view
            if(viewId === 'view-register-device') {
                setTimeout(() => document.getElementById('username').focus(), 100);
            }
        }

        // --- API Calls ---
        async function checkDevice() {
            showView('loading-view');
            try {
                // Simulate network delay for better UX feel
                await new Promise(r => setTimeout(r, 500)); 
                
                const response = await fetch(`${API_BASE}/device-status`, {
                    headers: { 'X-Device-ID': deviceId }
                });
                const data = await response.json();

                if (data.is_registered) {
                    renderUserSelection(data.family_name, data.members);
                    showView('view-select-user');
                } else {
                    showView('view-register-device');
                }
            } catch (error) {
                console.error(error);
                // Fallback for demo if API fails (e.g., server not running yet)
                showView('view-register-device');
            }
        }

        async function loginDevice(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = event.target.querySelector('button');
            
            const originalText = btn.innerText;
            btn.innerText = "Đang kết nối...";
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/register-device`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        device_id: deviceId,
                        device_name: navigator.platform + " Browser" 
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Kết nối thất bại');

                renderUserSelection(data.family_name, data.members);
                showView('view-select-user');

            } catch (error) {
                alert(error.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function registerFamily(event) {
            event.preventDefault();
            const familyName = document.getElementById('reg-family-name').value;
            const displayName = document.getElementById('reg-display-name').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const btn = event.target.querySelector('button');
            
            const originalText = btn.innerText;
            btn.innerText = "Đang tạo nhà...";
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/register-family`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        family_name: familyName,
                        admin_display_name: displayName,
                        admin_username: username,
                        admin_password: password,
                        device_id: deviceId,
                        device_name: navigator.platform + " Browser" 
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Đăng ký thất bại');

                renderUserSelection(data.family_name, data.members);
                showView('view-select-user');

            } catch (error) {
                alert(error.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function quickLogin(user) {
            console.log('=== quickLogin called ===');
            console.log('User:', user);
            console.log('User role:', user.role);
            console.log('Is parent?:', user.role === 'PARENT');

            if (user.role === 'PARENT') {
                console.log('✅ Detected PARENT role - showing PIN entry');
                selectedUserForPin = user;
                // Pre-fill avatar
                const avatarImg = document.getElementById('pin-avatar');
                console.log('Setting avatar src to:', user.avatar_url);
                avatarImg.src = user.avatar_url;
                clearPin();
                showView('view-enter-pin');
                console.log('✅ PIN entry view shown');
                return;
            }
            // Kid login
            console.log('✅ Kid login - calling performQuickLogin');
            await performQuickLogin(user.id);
        }

        async function performQuickLogin(userId, pin = null) {
            console.log('=== performQuickLogin called ===');
            console.log('userId:', userId);
            console.log('pin:', pin ? '****' : 'null');
            console.log('deviceId:', deviceId);

            try {
                const body = {
                    user_id: userId,
                    device_id: deviceId,
                    pin: pin
                };
                console.log('📤 Sending request body:', body);

                const response = await fetch(`${API_BASE}/quick-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                console.log('📥 Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('❌ API returned error:', errorData);
                    throw new Error(errorData.detail || 'Đăng nhập thất bại');
                }

                const data = await response.json();
                console.log('✅ Login response:', data);
                console.log('Response keys:', Object.keys(data));

                // Ensure redirect_url exists
                if (!data.redirect_url) {
                    console.error('❌ No redirect_url in response');
                    throw new Error('Không nhận được URL chuyển hướng từ server');
                }

                // Redirect based on role
                const redirectUrl = data.redirect_url || (data.role === 'PARENT' ? '/parent' : '/kid');
                console.log('🔗 Redirecting to:', redirectUrl);

                // Use location.href for more reliable redirect
                console.log('⏳ Setting window.location.href...');
                window.location.href = redirectUrl;

            } catch (error) {
                console.error('❌ Login error:', error);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);
                alert('❌ Lỗi đăng nhập: ' + error.message);
                if (pin) clearPin();
            }
        }
        
        function logoutDevice() {
            if(confirm("Bạn có chắc muốn quên thiết bị này không? Lần sau sẽ phải đăng nhập lại từ đầu.")) {
                localStorage.removeItem('kidcoin_device_id');
                window.location.reload();
            }
        }

        // --- UI Rendering ---
        function renderUserSelection(familyName, members) {
            document.getElementById('family-name').innerText = familyName;
            const grid = document.getElementById('user-grid');
            grid.innerHTML = '';
            
            // Sort: Parents first
            members.sort((a, b) => (a.role === 'PARENT' ? -1 : 1));

            members.forEach(user => {
                const userCard = document.createElement('div');
                userCard.className = 'flex flex-col items-center cursor-pointer group';
                userCard.onclick = () => quickLogin(user);
                
                const borderColor = user.role === 'PARENT' ? 'border-blue-200' : 'border-yellow-200';
                const ringColor = user.role === 'PARENT' ? 'group-hover:ring-blue-400' : 'group-hover:ring-yellow-400';

                userCard.innerHTML = `
                    <div class="relative mb-3 transition-transform duration-200 group-hover:scale-110">
                        <img src="${user.avatar_url || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.display_name}" class="w-28 h-28 rounded-full border-4 ${borderColor} shadow-lg bg-white object-cover ring-2 ring-transparent ${ringColor} transition-all">
                        ${user.role === 'PARENT' ? 
                        '<span class="absolute bottom-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-white shadow-sm">ADMIN</span>' : ''}
                    </div>
                    <span class="font-bold text-lg text-gray-700 group-hover:text-gray-900">${user.display_name}</span>
                `;
                grid.appendChild(userCard);
            });
        }

        // --- PIN Logic ---
        function enterPin(num) {
            if (pinInput.length < 4) {
                pinInput += num;
                updatePinDots();
                if (pinInput.length === 4) {
                    // Slight delay for UX
                    setTimeout(() => performQuickLogin(selectedUserForPin.id, pinInput), 100);
                }
            }
        }
        function clearPin() {
            pinInput = '';
            updatePinDots();
        }
        function updatePinDots() {
            const dots = document.querySelectorAll('#pin-dots .pin-dot');
            dots.forEach((dot, index) => {
                if (index < pinInput.length) {
                    dot.classList.add('filled', 'bg-blue-500', 'border-blue-500');
                } else {
                    dot.classList.remove('filled', 'bg-blue-500', 'border-blue-500');
                }
            });
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            deviceId = getOrSetDeviceId();
            
            // Style PIN buttons
            document.querySelectorAll('.pin-btn').forEach(btn => {
                if(!btn.className.includes('text-sm')) {
                    btn.className = 'pin-btn text-2xl font-bold text-gray-700 bg-gray-100 rounded-full w-16 h-16 flex items-center justify-center shadow-sm hover:bg-gray-200 active:bg-blue-100 transition-colors mx-auto';
                }
            });
            
            checkDevice();
        });
    </script>
</body>
</html>
